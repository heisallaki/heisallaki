name: Update GitHub Profile

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours

  workflow_dispatch:

  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Profile Repository
        uses: actions/checkout@v4

      - name: Update README Timestamp
        run: |
          echo "Profile workflow executed successfully."

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated profile update"